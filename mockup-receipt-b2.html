<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup B2 — Contador por participante</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 p-6 font-sans">

  <h1 class="text-base font-bold text-zinc-700 mb-1 text-center">Mockup — Contador por participante</h1>
  <p class="text-xs text-zinc-400 text-center mb-8">Interactivo — prueba los botones</p>

  <div class="max-w-md mx-auto flex flex-col gap-3" id="app"></div>

  <script>
    const PARTICIPANTS = ["Juan", "Pedro", "María", "Carlos"];
    const UNIT_PRICE = (total, qty) => Math.round(total / qty);

    const ITEMS = [
      { id: 1, name: "Shot de Tequila",        total: 64800, qty: 16 },
      { id: 2, name: "Vienesa Italiana",        total: 13050, qty: 3  },
      { id: 3, name: "Limonada Menta-Jenjibre", total: 3600,  qty: 1  },
      { id: 4, name: "Kross Stout",             total: 7800,  qty: 2  },
    ];

    // State
    const state = {
      // counts[itemId][participantName] = number
      counts: Object.fromEntries(ITEMS.map(i => [i.id, Object.fromEntries(PARTICIPANTS.map(p => [p, 0]))])),
      // collapsed[itemId] = bool
      collapsed: Object.fromEntries(ITEMS.map(i => [i.id, false])),
    };

    function fmt(n) {
      return n.toLocaleString("es-CL");
    }

    function totalAssigned(itemId) {
      return Object.values(state.counts[itemId]).reduce((a, b) => a + b, 0);
    }

    function increment(itemId, name) {
      const item = ITEMS.find(i => i.id === itemId);
      if (totalAssigned(itemId) >= item.qty) return;
      state.counts[itemId][name]++;
      render();
    }

    function decrement(itemId, name) {
      if (state.counts[itemId][name] <= 0) return;
      state.counts[itemId][name]--;
      render();
    }

    function toggleCollapse(itemId) {
      state.collapsed[itemId] = !state.collapsed[itemId];
      render();
    }

    function renderItem(item) {
      const assigned = totalAssigned(item.id);
      const remaining = item.qty - assigned;
      const unitPrice = UNIT_PRICE(item.total, item.qty);
      const isComplete = assigned === item.qty;
      const isCollapsed = state.collapsed[item.id];
      const hasMultiple = item.qty > 1;

      const participantRows = PARTICIPANTS.map(name => {
        const count = state.counts[item.id][name];
        const amount = count * unitPrice;
        return `
          <div class="flex items-center justify-between py-2 px-3 ${count > 0 ? 'bg-violet-50' : 'bg-zinc-50'} border-b border-zinc-100 last:border-0">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-xs font-medium ${count > 0 ? 'text-violet-700' : 'text-zinc-500'} w-14 truncate">${name}</span>
              ${count > 0 ? `<span class="text-xs tabular-nums text-violet-500">$${fmt(amount)}</span>` : ''}
            </div>
            <div class="flex items-center gap-1.5 shrink-0">
              <button
                onclick="decrement(${item.id}, '${name}')"
                class="w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold transition-colors ${count > 0 ? 'bg-violet-100 text-violet-600 hover:bg-violet-200' : 'bg-zinc-100 text-zinc-300 cursor-not-allowed'}"
              >−</button>
              <span class="w-5 text-center text-xs font-semibold tabular-nums ${count > 0 ? 'text-violet-700' : 'text-zinc-300'}">${count}</span>
              <button
                onclick="increment(${item.id}, '${name}')"
                class="w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold transition-colors ${remaining > 0 ? 'bg-violet-100 text-violet-600 hover:bg-violet-200' : 'bg-zinc-100 text-zinc-300 cursor-not-allowed'}"
              >+</button>
            </div>
          </div>
        `;
      }).join("");

      const statusBadge = isComplete
        ? `<span class="text-xs font-medium text-emerald-600 bg-emerald-50 rounded-full px-2 py-0.5">✓ listo</span>`
        : assigned === 0
          ? `<span class="text-xs text-zinc-400">${item.qty} sin asignar</span>`
          : `<span class="text-xs text-amber-600 bg-amber-50 rounded-full px-2 py-0.5">${remaining} restante${remaining !== 1 ? 's' : ''}</span>`;

      return `
        <div class="rounded-xl border ${isComplete ? 'border-emerald-200' : 'border-zinc-200'} bg-white overflow-hidden shadow-sm">
          <!-- Header -->
          <div
            class="flex items-center justify-between px-3 py-2.5 cursor-pointer select-none ${hasMultiple ? 'hover:bg-zinc-50' : ''}"
            onclick="${hasMultiple ? `toggleCollapse(${item.id})` : ''}"
          >
            <div class="flex items-center gap-2 min-w-0">
              ${hasMultiple ? `<span class="text-zinc-400 text-xs transition-transform ${isCollapsed ? '' : 'rotate-90'} inline-block">▶</span>` : ''}
              <span class="text-sm font-medium text-zinc-800 truncate">${item.name}</span>
              ${item.qty > 1 ? `<span class="text-xs bg-zinc-100 text-zinc-500 rounded-full px-1.5 py-0.5 shrink-0">×${item.qty}</span>` : ''}
            </div>
            <div class="flex items-center gap-2 shrink-0 ml-2">
              ${statusBadge}
              <span class="text-sm tabular-nums font-semibold text-zinc-700">$${fmt(item.total)}</span>
            </div>
          </div>

          <!-- Participants (colapsable si qty > 1) -->
          ${!hasMultiple || !isCollapsed ? `
            <div class="border-t border-zinc-100">
              ${participantRows}
            </div>
          ` : ''}
        </div>
      `;
    }

    function render() {
      const totalItems = ITEMS.length;
      const completeItems = ITEMS.filter(i => totalAssigned(i.id) === i.qty).length;

      document.getElementById("app").innerHTML = `
        <!-- Header IA -->
        <div class="rounded-xl border border-violet-200 bg-violet-50 px-4 py-3 flex items-center justify-between">
          <p class="text-xs font-semibold text-violet-700">✨ ${totalItems} ítems detectados en boleta</p>
          <span class="text-xs text-violet-500">${completeItems}/${totalItems} asignados</span>
        </div>

        ${ITEMS.map(renderItem).join("")}

        <!-- Botones finales -->
        <div class="flex gap-2 pt-1">
          <button class="flex-1 rounded-xl bg-violet-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-violet-700 transition-colors ${completeItems === totalItems ? '' : 'opacity-60'}">
            Usar ítems
          </button>
          <button class="rounded-xl border border-zinc-200 px-4 py-2.5 text-sm text-zinc-500 hover:bg-zinc-50 transition-colors">
            Descartar
          </button>
        </div>

        <p class="text-xs text-zinc-400 text-center pb-2">
          ${completeItems < totalItems ? '⚠️ Puedes usar los ítems aunque no todos estén asignados' : '✓ Todo asignado — listo para guardar'}
        </p>
      `;
    }

    render();
  </script>
</body>
</html>
